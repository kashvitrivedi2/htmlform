<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        body{
            background-color: antiquewhite;
        }
        ._parent{
            display: flex;
            justify-content:center;
            align-items: center;
            margin:0;
            height: 100vh;
        }
        ._box{
            max-width: 500px;
            height: fit-content;
            background-color: chartreuse;
            padding-left: 20px;
            padding-bottom: 20px;
            padding-right: 20px;
            padding-top: 10px;
            margin:0;
            border-radius: 20px;
        }
        label{
            font-weight: bold;
        }
        input{
            margin-top: 5px;
        }
        textarea{
            margin-top: 5px;
        }
        h2{
            margin-top: 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="_parent">
        <div class="_box">
            <form method="post" action="/submit">
            <h2>Form</h2>
            <label for="username">Username: </label><br>
            <input id="username" type="text" name="username" required><br><br>
            <label for="password"> &nbsp;Password: </label><br>
            <input id="password" type="password" name="password" required><br><br>
            <label >Textarea:</label><br>
            <textarea name="textarea" rows="2" cols="23"></textarea><br><br>
            <button type="submit" formaction="/submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
